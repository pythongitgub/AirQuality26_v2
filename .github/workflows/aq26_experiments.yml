name: AQ26 Experiments

on:
  workflow_dispatch:

jobs:
  run-experiments:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install papermill pandas numpy matplotlib requests pyarrow fastparquet

      - name: Create output folders
        run: |
          mkdir -p outputs

      # ---------- EXPERIMENT PIPELINE ----------

      - name: Coastal gradient experiment
        run: |
          python -m papermill --kernel python3 notebooks/20_coastal_gradient_experiment.ipynb outputs/20_coastal_gradient.out.ipynb

      - name: Clear sky snapshot
        run: |
          python -m papermill --kernel python3 notebooks/21_clear_sky_snapshot.ipynb outputs/21_clear_sky_snapshot.out.ipynb

      - name: Wind calm accumulation
        run: |
          python -m papermill --kernel python3 notebooks/22_wind_calm_pollution_accumulation.ipynb outputs/22_wind_calm_pollution.out.ipynb

      - name: Back trajectory reconstruction
        run: |
          python -m papermill --kernel python3 notebooks/23_back_trajectory_reconstruction.ipynb outputs/23_back_trajectory.out.ipynb

      - name: Event correlation
        run: |
          python -m papermill --kernel python3 notebooks/24_event_correlation.ipynb outputs/24_event_correlation.out.ipynb

      - name: Plume fingerprinting
        run: |
          python -m papermill --kernel python3 notebooks/25_satellite_plume_fingerprinting.ipynb outputs/25_plume_fingerprint.out.ipynb

      - name: Crosswind plume tomography
        run: |
          python -m papermill --kernel python3 notebooks/26_crosswind_plume_tomography.ipynb outputs/26_crosswind_tomography.out.ipynb

      - name: Pollution accumulation index
        run: |
          python -m papermill --kernel python3 notebooks/27_pollution_accumulation_index.ipynb outputs/27_pollution_index.out.ipynb

      # ---------- SAVE RESULTS ----------

      - name: Upload experiment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aq26-experiment-results
          path: outputs/
