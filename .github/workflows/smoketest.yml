name: AQ26 Secret Smoke Test

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  smoketest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run secret smoke test
        env:
          CDSE_USERNAME: ${{ secrets.CDSE_USERNAME }}
          CDSE_PASSWORD: ${{ secrets.CDSE_PASSWORD }}
        

          OPENWEATHER_KEY: ${{ secrets.OPENWEATHER_KEY }}
          WAQI_TOKEN: ${{ secrets.WAQI_TOKEN }}
          

          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          NEWS_DATA_IO_KEY: ${{ secrets.NEWS_DATA_IO_KEY }}

          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}

          MET_OFFICE_KEY: ${{ secrets.MET_OFFICE_KEY }}
        
        run: |
          python scripts/smoketest.py
