name: AQ26 Documentary Layer

on:
  workflow_dispatch:

jobs:
  run-documentary-layer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pandas pyarrow pyyaml nbformat nbconvert jupyter ipykernel

      - name: Install kernel
        run: |
          python -m ipykernel install --user --name python3 --display-name "Python 3"

      - name: Run notebooks 61–67
        shell: bash
        run: |
          set -euo pipefail
          NOTEBOOKS=(
            notebooks/61_report_catalog_ingest.ipynb
            notebooks/62_emissions_documentary_layer.ipynb
            notebooks/63_cems_noncompliance_layer.ipynb
            notebooks/64_documentary_site_year_linkage.ipynb
            notebooks/65_documentary_evidence_fusion.ipynb
            notebooks/66_documentary_adjudication_patch.ipynb
            notebooks/67_final_forensic_summary.ipynb
          )
          for nb in "${NOTEBOOKS[@]}"; do
            echo "=== RUNNING $nb ==="
            jupyter nbconvert --to notebook --execute "$nb" --output "executed_$(basename "$nb")"
          done

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: aq26-documentary-layer-outputs
          path: outputs/
